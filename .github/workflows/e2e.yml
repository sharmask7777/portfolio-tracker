name: E2E Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci --legacy-peer-deps
        cd frontend && npm ci --legacy-peer-deps
        cd ../backend && npm ci --legacy-peer-deps

    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: |
        cat <<EOF > .env
        DOCKER_REGISTRY_USER=shaleenks
        PORTFOLIO_DB_USER=postgres
        PORTFOLIO_DB_PASSWORD=password
        PORTFOLIO_DB_NAME=portfolio_tracker
        IP_GLOBAL=localhost
        TZ_GLOBAL=UTC
        VOLUME_PREFIX_GLOBAL=.
        VITE_API_PORT=3001
        VITE_API_URL=http://localhost:3001
        EOF
        
        export NODE_ENV=development
        npm run docker:up
        echo "Waiting for services to become ready..."
        sleep 10
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Running smoke and responsiveness tests..."
          (cd frontend && npm run test:e2e:docker -- tests/smoke.spec.ts tests/responsiveness.spec.ts)
        else
          echo "Running full E2E suite..."
          (cd frontend && npm run test:e2e:docker)
        fi
        npm run docker:down

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
