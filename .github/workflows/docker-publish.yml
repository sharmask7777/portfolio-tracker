name: Docker Build and Publish

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: shaleenks/portfolio-backend:latest
          cache-from: type=registry,ref=shaleenks/portfolio-backend:buildcache
          cache-to: type=registry,ref=shaleenks/portfolio-backend:buildcache,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: shaleenks/portfolio-frontend:latest
          cache-from: type=registry,ref=shaleenks/portfolio-frontend:buildcache
          cache-to: type=registry,ref=shaleenks/portfolio-frontend:buildcache,mode=max
