services:
  postgres:
    image: postgres:15-alpine
    container_name: portfolio_tracker_db
    restart: always
    environment:
      POSTGRES_USER: ${PORTFOLIO_DB_USER}
      POSTGRES_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
      POSTGRES_DB: ${PORTFOLIO_DB_NAME}
      TZ: ${TZ_GLOBAL}
    volumes:
      # Maps to your specific disk and appdata structure
      - "${VOLUME_PREFIX_GLOBAL}/appdata/portfolio/db:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTFOLIO_DB_USER} -d ${PORTFOLIO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio_tracker_redis
    restart: always
    environment:
      TZ: ${TZ_GLOBAL}
    volumes:
      - "${VOLUME_PREFIX_GLOBAL}/appdata/portfolio/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY_USER}/portfolio-backend:latest
    container_name: portfolio_tracker_backend
    restart: always
    ports:
      - "${VITE_API_PORT}:3001"
    environment:
      DATABASE_URL: "postgresql://${PORTFOLIO_DB_USER}:${PORTFOLIO_DB_PASSWORD}@postgres:5432/${PORTFOLIO_DB_NAME}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PYTHON_PATH: python3
      TZ: ${TZ_GLOBAL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY_USER}/portfolio-frontend:latest
    container_name: portfolio_tracker_frontend
    restart: always
    ports:
      - "8082:80" # Avoid conflict with OMV Web UI on port 80
    environment:
      VITE_API_URL: "http://${IP_GLOBAL}:${VITE_API_PORT}"
      TZ: ${TZ_GLOBAL}
    depends_on:
      - backend
